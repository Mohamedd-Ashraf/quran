name: noor_al_imaan
description: "Noor Al-Imaan - Islamic learning app with Quran, Hadith, Prayer Times, and more."
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.1.1+2022

environment:
  sdk: ^3.10.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Remote API
  http: ^1.2.1
  
  # Service Locator
  get_it: ^7.7.0
  
  # Network Info
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # File system (offline audio)
  path_provider: ^2.1.5

  # Audio playback
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.12
  audio_session: ^0.1.21

  # Location + Islamic utilities
  geolocator: 13.0.4
  adhan: ^2.0.0
  flutter_compass: ^0.8.0

  # Local notifications (for Adhan reminders)
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1

  # App Updates
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.1
  in_app_update: ^4.2.2
  dio: ^5.4.0
  open_file: ^3.3.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_remote_config: ^5.1.4
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  google_sign_in_platform_interface: ^2.5.0

  permission_handler: ^11.3.1
  flutter_timezone: ^5.0.1
  share_plus: ^12.0.1
  # Interactive tutorial / walkthrough overlay
  tutorial_coach_mark: ^1.2.11

  # QCF Quran rendering – full Madani Mushaf with turnkey widgets
  # Local fork: only 66 key pages bundled; remaining 538 downloaded on demand
  qcf_quran_plus:
    path: packages/qcf_quran_plus
  scrollable_positioned_list: ^0.3.8


  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dependency_overrides:
  intl: 0.20.2
  # Pin to 6.2.1 — uses Credential Manager on Android 14+ (required for
  # getIdToken without falling back to deprecated GoogleAuthUtil.getToken()).
  # ProGuard rules keep the CredentialProvider ServiceLoader impl from being
  # stripped by R8 full mode. See proguard-rules.pro.
  google_sign_in_android: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/files/transparent/main_logo_transparent.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F5132"
  adaptive_icon_foreground: "assets/logo/files/transparent/main_logo_transparent.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # - assets/ui-ux/ # Commented out to reduce size as it seems unused
    - assets/offline/
    - assets/update-config.json
    - assets/logo/files/
    - assets/logo/files/transparent/
    # Only include button icons that are actually referenced in code
    - "assets/logo/button icons/moon.png"
    - "assets/logo/button icons/praying.png"
    - "assets/logo/button icons/nabawi-mosque.png"
    - "assets/logo/button icons/microphone.png"
    - "assets/logo/button icons/quran.png"
    - "assets/logo/button icons/qibla.png"
    - "assets/logo/button icons/beads.png"
    - "assets/logo/button icons/radio.png"
    - "assets/logo/button icons/Roqia.png"
    - "assets/logo/button icons/Roqia-mono.png"
    - "assets/logo/button icons/Tafsir-icon.png"
    - "assets/logo/button icons/Tafsir-icon-mono.png"
    - assets/fonts/
    - assets/google_fonts/
    - assets/hadith/
    - assets/logo/button icons/hadith.png
    - assets/logo/button icons/calendar.png
    - assets/logo/button icons/calendar_1.png
    - assets/logo/button icons/cup.png
    - assets/logo/files/page_number.png

    # - assets/sound/ # Commented out to reduce size as it seems unused and contains images?

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs1Ver18.ttf

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package


