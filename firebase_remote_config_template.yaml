# Firebase Remote Config - Default Parameters
# Copy these to Firebase Console → Remote Config

latest_version:
  Type: String
  Value: "1.1.2"
  Description: "Latest available version of the app"

minimum_version:
  Type: String
  Value: "1.0.8"
  Description: "Minimum required version (users below this must update)"

is_mandatory:
  Type: Boolean
  Value: false
  Description: "Whether this update is mandatory for all users"

download_url:
  Type: String
  Value: "https://play.google.com/store/apps/details?id=com.yourcompany.quraan"
  Description: |
    Update destination URL.
    Android production policy: use Google Play listing URL only.
    iOS: use the App Store listing URL.
    Non-store direct APK links are blocked by app code on Android.

download_url_arm64_v8a:
  Type: String
  Value: ""
  Description: "Deprecated for Android production. Keep empty."

download_url_armeabi_v7a:
  Type: String
  Value: ""
  Description: "Deprecated for Android production. Keep empty."

download_url_x86_64:
  Type: String
  Value: ""
  Description: "Deprecated for Android production. Keep empty."

changelog_ar:
  Type: String
  Value: |
    ✨ الجديد في نور الإيمان 1.1.1:
    • أداة التقويم الهجري الشهرية على الشاشة الرئيسية
    • توسعة مكتبة الأذكار بأقسام جديدة (الوضوء، الاستخارة، القنوت وغيرها)
    • دعم القراءات العشر والروايات في التلاوة الصوتية
    • تحديد نقطة بداية الورد اليومي في القرآن
    • التحدي اليومي يحفظ إجابتك بدون إنترنت
    • إشعار الأذان يفتح شاشة مواقيت الصلاة مباشرة
    • إصلاحات وتحسينات عامة في الأداء والاستقرار
  Description: "Changelog in Arabic"

changelog_en:
  Type: String
  Value: |
    ✨ What's New in Noor Al-Iman 1.1.1:
    • Monthly Hijri Calendar home-screen widget
    • Expanded adhkar library with new sections (Wudu, Istikhara, Qunut & more)
    • Ten Qira'at & recitation variants support
    • Set a custom starting point for your daily Wird
    • Daily Challenge saves answers offline and syncs when connected
    • Adhan notification opens Prayer Times directly
    • Bug fixes and general performance improvements
  Description: "Changelog in English"

release_date:
  Type: String
  Value: "2026-03-14T00:00:00.000Z"
  Description: "Release date in ISO 8601 format"

enable_in_app_update:
  Type: Boolean
  Value: true
  Description: "Enable in-app updates for Android (uses Google Play In-App Updates API)"
